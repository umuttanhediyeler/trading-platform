# TLS overlay for the production stack — Let's Encrypt via the nginx + certbot
# webroot flow. Layer it on top of the production compose file:
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.tls.yml --env-file .env.prod up -d
#
# Do NOT run this by hand for the first issuance — use ./init-letsencrypt.sh,
# which renders the domain config, bootstraps a temporary self-signed cert so
# nginx can boot, then obtains the real certificate. See infra/README-TLS.md.
#
# No certificates or keys are committed: they live only in the certbot-certs
# named volume on the host.

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      # Rendered from nginx/tls/app.conf.template by init-letsencrypt.sh.
      - ./nginx/tls/app.conf:/etc/nginx/tls/app.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    # Reload every 6h so renewed certificates are picked up without downtime.
    command:
      - /bin/sh
      - -c
      - "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:v3.1.0
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Attempt renewal twice a day; certbot no-ops until a cert is near expiry.
    entrypoint:
      - /bin/sh
      - -c
      - "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot-certs:
  certbot-www:
