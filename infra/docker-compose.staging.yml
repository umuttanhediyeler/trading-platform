# Image overrides for the staging host. The base compose file still owns
# healthchecks, networks, env files and persistent volumes.
services:
  api:
    image: ghcr.io/${IMAGE_OWNER}/apex-scan-api:staging

  web:
    image: ghcr.io/${IMAGE_OWNER}/apex-scan-web:staging
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: ""

  ml-service:
    image: ghcr.io/${IMAGE_OWNER}/apex-scan-ml:staging

  backtest-service:
    image: ghcr.io/${IMAGE_OWNER}/apex-scan-backtest:staging

  nginx:
    ports:
      - "80:80"

  # --- Observability (staging) --------------------------------------------
  # Same Prometheus scrape + Grafana provisioning as production. Gated behind
  # the "full" profile so datastore-only bring-ups skip them.
  prometheus:
    profiles: ["full"]
    image: prom/prometheus:v2.54.1
    container_name: tp-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy

  grafana:
    profiles: ["full"]
    image: grafana/grafana:11.2.2
    container_name: tp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND_ADDR:-127.0.0.1}:3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  promdata:
  grafanadata:
