# Grafana datasource provisioning — auto-wires the Prometheus service so the
# dashboards work on first boot with no manual clicking.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
