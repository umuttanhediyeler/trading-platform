# Single-host production stack — everything in one place.
#
# Brings up the full platform (TimescaleDB + Redis + API + ML + Backtest + Web
# + nginx) on one Docker host, building every image locally from source so no
# container registry is required. Public traffic enters only through nginx:80.
#
#   cd infra
#   cp .env.prod.example .env.prod   # then fill in secrets (deploy.sh generates them)
#   ./deploy.sh
#
# All configuration is read from ./.env.prod (single source of truth).

name: apex-scan

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8001
      BACKTEST_SERVICE_URL: http://backtest-service:8002
      WEB_ORIGIN: ${PUBLIC_ORIGIN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-service:
    build:
      context: ../packages/ml
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MODEL_ARTIFACT_DIR: /var/lib/trading-platform/model-artifacts
    volumes:
      - mlartifacts:/var/lib/trading-platform/model-artifacts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  backtest-service:
    build:
      context: ../packages/backtest
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* are baked at build time. Same-origin behind nginx:
        # REST -> /api, and Socket.io uses window.location.origin.
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_WS_URL: ""
    restart: unless-stopped
    environment:
      # Server-side (NextAuth callbacks / RSC) reach the API container directly;
      # the browser still uses the baked "/api" relative URL through nginx.
      INTERNAL_API_URL: http://api:3001
      NEXTAUTH_URL: ${PUBLIC_ORIGIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/locations.conf:/etc/nginx/conf.d/locations.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  # --- Observability -------------------------------------------------------
  # Prometheus scrapes the API's /metrics endpoint. Internal-only: no host port
  # is published, so it is reachable solely on the Docker network (or via an SSH
  # tunnel to the container). Data persists across restarts.
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy

  # Grafana UI bound to localhost by default (GRAFANA_BIND_ADDR). Reach it via
  # `ssh -L 3002:127.0.0.1:3002 user@host`. Datasource + dashboards are
  # auto-provisioned. Admin credentials come from .env.prod (generated).
  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND_ADDR:-127.0.0.1}:3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  mlartifacts:
  promdata:
  grafanadata:
