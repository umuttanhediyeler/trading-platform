# Local development stack for the trading platform.
#
# Brings up the shared datastores (TimescaleDB-enabled Postgres + Redis) and,
# optionally, all application services. For day-to-day backend/frontend work you
# typically only need the datastores:
#
#   docker compose -f infra/docker-compose.yml up -d postgres redis
#
# The full stack (api, ml-service, backtest-service, web) requires each service's
# .env / .env.local file and Dockerfile to exist first (see the app specs).
#
# NOTE: credentials below are development defaults only. Never reuse them in prod.

name: trading-platform

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: tp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    # Host 5433 avoids clashing with other local Postgres (e.g. Defendence on 5432).
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql runs once, only when the data volume is first created.
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tp-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    # Host 6380 avoids clashing with other local Redis (e.g. Defendence on 6379).
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application services. Enabled via the "full" profile so that a bare
  # `docker compose up` only starts the datastores:
  #   docker compose --profile full up
  # Each depends on a Dockerfile + env file that live in the respective app.
  # ---------------------------------------------------------------------------
  api:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: tp-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/trading
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8001
      BACKTEST_SERVICE_URL: http://backtest-service:8002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-service:
    profiles: ["full"]
    build:
      context: ../packages/ml
      dockerfile: Dockerfile
    container_name: tp-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../packages/ml/.env
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/trading
      MODEL_ARTIFACT_DIR: /var/lib/trading-platform/model-artifacts
    volumes:
      - mlartifacts:/var/lib/trading-platform/model-artifacts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  backtest-service:
    profiles: ["full"]
    build:
      context: ../packages/backtest
      dockerfile: Dockerfile
    container_name: tp-backtest
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ../packages/backtest/.env
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/trading
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: tp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../apps/web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy

  nginx:
    profiles: ["full"]
    image: nginx:1.27-alpine
    container_name: tp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/locations.conf:/etc/nginx/conf.d/locations.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  mlartifacts:
