# Production reverse proxy for the trading platform.
#
# Routing model (see cursor_detailed_spec.md §6):
#   /            -> web  (Next.js, :3000)
#   /api/        -> api  (NestJS,  :3001)   [strips the /api prefix]
#   /ws/         -> api  (Socket.io gateway, WebSocket upgrade)
#
# apps/web never talks to Postgres/Redis directly; all traffic funnels through api.
# ML and backtest services are internal-only and are NOT exposed here.

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # gzip for text-based responses.
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript
                      application/xml text/xml application/rss+xml image/svg+xml;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;

    server_tokens off;

    # Map for WebSocket connection upgrade.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream web_upstream {
        server web:3000;
        keepalive 32;
    }

    upstream api_upstream {
        server api:3001;
        keepalive 32;
    }

    # Basic abuse protection for the API surface.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # Default HTTP server. Always serves the ACME HTTP-01 challenge so
    # Let's Encrypt can issue/renew certificates, and serves the app over plain
    # HTTP (e.g. IP access before a domain/TLS is configured).
    server {
        listen 80 default_server;
        server_name _;

        # Let's Encrypt webroot challenge. The path is a shared volume with the
        # certbot container in the TLS overlay; harmless (404) when TLS is off.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        include /etc/nginx/conf.d/locations.conf;
    }

    # --- Optional TLS server(s) ------------------------------------------------
    # Populated only by the TLS overlay (infra/docker-compose.tls.yml +
    # infra/init-letsencrypt.sh, see infra/README-TLS.md). This wildcard include
    # is a no-op when the directory is empty / not mounted, so the base HTTP
    # stack keeps working with no certificates present.
    include /etc/nginx/tls/*.conf;
}
