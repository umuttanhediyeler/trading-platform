# Shared location blocks, included by both the HTTP and HTTPS server blocks.

# Socket.io transport endpoint. The client connects to the "/ws" namespace,
# but Socket.io's actual HTTP/WebSocket handshake path is "/socket.io/"
# (the namespace travels inside the handshake, not the URL). This location
# must therefore match "/socket.io/" and must come before "/api/" and "/".
location /socket.io/ {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# REST API — strip the /api prefix before forwarding to NestJS.
location /api/ {
    limit_req zone=api_limit burst=40 nodelay;

    # Stripe webhook signature verification needs the raw, unbuffered body.
    proxy_request_buffering off;

    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# Everything else -> Next.js frontend.
location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
