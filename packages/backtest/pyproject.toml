[tool.poetry]
name = "backtest-service"
version = "0.1.0"
description = "Backtest service: signal backtesting engine (vectorbt with pandas fallback) and performance metrics"
authors = ["Trading Platform"]
packages = [{ include = "app" }]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.111"
uvicorn = "^0.29"
vectorbt = "^0.26"
pandas = "^2.2"
sentry-sdk = {version = "^2.0", extras = ["fastapi"]}

[tool.poetry.group.dev.dependencies]
pytest = "^8.2"
httpx = "^0.27"

[build-system]
requires = ["poetry-core>=1.9"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
