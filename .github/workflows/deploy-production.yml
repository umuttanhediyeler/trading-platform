# Full-stack production deploy: GitHub → SSH → docker-compose.prod.yml
#
# Enable after VPS bootstrap (see infra/DEPLOY-GITHUB.md):
#   Repository variable: PRODUCTION_DEPLOY_ENABLED = true
#   Repository variable: PRODUCTION_APP_PATH     = /opt/trading-platform
#   Secrets: PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY
#
name: Deploy production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: verify
    if: vars.PRODUCTION_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy full stack over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            APP="${{ vars.PRODUCTION_APP_PATH }}"
            if [ ! -d "$APP/.git" ]; then
              echo "Repo not found at $APP — run infra/scripts/vps-bootstrap.sh on the server first." >&2
              exit 1
            fi
            cd "$APP"
            git fetch origin main
            git reset --hard origin/main
            cd infra
            chmod +x deploy.sh
            ./deploy.sh

            echo "==> Post-deploy health check (nginx → API)"
            ok=false
            for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1/api/health >/dev/null 2>&1; then
                ok=true
                break
              fi
              sleep 10
            done
            if [ "$ok" != "true" ]; then
              echo "Health check failed" >&2
              docker compose -f docker-compose.prod.yml --env-file .env.prod ps
              exit 1
            fi
            echo "==> Production deploy healthy"
