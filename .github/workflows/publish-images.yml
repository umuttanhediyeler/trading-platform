name: Publish Docker images

# Build on GitHub-hosted runners (~7GB RAM) so Render Free only pulls images
# and never compiles the Nest monorepo (which OOMs on 512MB).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  api:
    name: API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trading-platform-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trading-platform-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ml:
    name: ML image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/ml
          file: packages/ml/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trading-platform-ml:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trading-platform-ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backtest:
    name: Backtest image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/backtest
          file: packages/backtest/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trading-platform-backtest:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/trading-platform-backtest:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
