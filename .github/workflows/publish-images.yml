name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: umuttanhediyeler

jobs:
  publish-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-platform-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-platform-api:${{ github.sha }}

  publish-web:
    runs-on: ubuntu-latest
    needs: publish-api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://p01--trading-platform--7sr8t6gf9nj6.code.run
            NEXT_PUBLIC_WS_URL=wss://p01--trading-platform--7sr8t6gf9nj6.code.run
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-platform-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-platform-web:${{ github.sha }}
