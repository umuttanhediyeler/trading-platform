name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript (lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @trading-platform/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  python:
    name: Python ML and backtest tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/ml pytest httpx

      - name: Run ML tests including leakage gate
        working-directory: packages/ml
        run: pytest -v

      - name: Install backtest test dependencies
        run: pip install -e packages/backtest pytest httpx

      - name: Run backtest anti-look-ahead tests
        working-directory: packages/backtest
        run: pytest -v

  security:
    name: Security checks (secrets · deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Secret scanning — blocks any credential accidentally committed. Scans
      # the working tree so results are deterministic and PR-scoped.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source=/repo --no-git --redact --verbose --no-banner

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the pipeline on high/critical advisories in production dependencies.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      # Python advisories are surfaced but non-blocking: they usually originate
      # upstream and shouldn't wedge deploys. Review the log on each run.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e packages/ml -e packages/backtest
          pip-audit --progress-spinner off

  e2e:
    name: E2E smoke (public paths)
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NEXTAUTH_SECRET: e2e-ci-not-a-real-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PLAYWRIGHT_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the web app and its workspace dependencies (not the API/Prisma).
      - name: Build web
        run: pnpm --filter @trading-platform/web... build

      - name: Install Playwright browser
        run: pnpm --filter @trading-platform/web exec playwright install --with-deps chromium

      # Playwright boots `next start` itself (see playwright.config webServer).
      # Only the public suite runs here; the authenticated suite self-skips
      # because no API is reachable at PLAYWRIGHT_API_URL.
      - name: Run public smoke tests
        run: pnpm --filter @trading-platform/web exec playwright test --grep "public pages"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/.cache/playwright/test-results
          retention-days: 7

  infra:
    name: Infra config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose
        working-directory: infra
        run: docker compose -f docker-compose.prod.yml --env-file .env.prod.example config >/dev/null

      - name: Validate staging compose
        working-directory: infra
        env:
          IMAGE_OWNER: example
        run: docker compose -f docker-compose.yml -f docker-compose.staging.yml config >/dev/null

      - name: Validate TLS overlay compose
        working-directory: infra
        run: docker compose -f docker-compose.prod.yml -f docker-compose.tls.yml --env-file .env.prod.example config >/dev/null

      - name: Validate base nginx config
        working-directory: infra
        run: |
          docker run --rm \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/nginx/conf.d/locations.conf:/etc/nginx/conf.d/locations.conf:ro" \
            nginx:1.27-alpine nginx -t

      - name: Validate rendered TLS nginx config
        working-directory: infra
        run: |
          mkdir -p .citls/live/example.com .citls/www
          DOMAIN=example.com envsubst '${DOMAIN}' \
            < nginx/tls/app.conf.template > .citls/app.conf
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout .citls/live/example.com/privkey.pem \
            -out .citls/live/example.com/fullchain.pem \
            -subj "/CN=example.com"
          docker run --rm \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/nginx/conf.d/locations.conf:/etc/nginx/conf.d/locations.conf:ro" \
            -v "$PWD/.citls/app.conf:/etc/nginx/tls/app.conf:ro" \
            -v "$PWD/.citls:/etc/letsencrypt:ro" \
            -v "$PWD/.citls/www:/var/www/certbot:ro" \
            nginx:1.27-alpine nginx -t

      - name: Validate Grafana dashboards are valid JSON
        working-directory: infra
        run: |
          for f in grafana/dashboards/*.json; do
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
            echo "OK: $f"
          done
