# Render Blueprint — native runtimes (more reliable on Free than heavy Docker builds)
# https://dashboard.render.com/blueprints
#
# After create, set on each service (or paste from Desktop/render-api-env.txt):
#   DATABASE_URL, REDIS_URL, WEB_ORIGIN, JWT_*, ENCRYPTION_KEY (64 hex chars)

services:
  - type: web
    name: apex-scan-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      corepack enable && corepack prepare pnpm@9.15.0 --activate &&
      NODE_ENV=development pnpm install --frozen-lockfile --filter @trading-platform/api... &&
      pnpm --filter @trading-platform/shared-types build &&
      pnpm --filter @trading-platform/data build &&
      pnpm --filter @trading-platform/api exec prisma generate &&
      pnpm --filter @trading-platform/api build
    startCommand: |
      cd apps/api &&
      node ../../node_modules/prisma/build/index.js migrate deploy &&
      node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: BACKTEST_SERVICE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: MARKET_DATA_PROVIDER
        value: alpaca
      - key: ALLOW_LIVE_BROKER
        value: "false"

  - type: web
    name: apex-scan-ml
    runtime: python
    plan: free
    rootDir: packages/ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: apex-scan-backtest
    runtime: python
    plan: free
    rootDir: packages/backtest
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
