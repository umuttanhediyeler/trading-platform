# Render Free — deploy prebuilt images from GHCR (no on-platform compile).
# Images are built by .github/workflows/publish-images.yml (free GitHub Actions).
#
# One-time: make GHCR packages public (Packages → package → Package settings → Change visibility)
#   - trading-platform-api
#   - trading-platform-ml
#   - trading-platform-backtest
#
# Env: paste from Desktop/render-api-env.txt (DATABASE_URL, REDIS_URL, WEB_ORIGIN, ENCRYPTION_KEY, …)

services:
  - type: web
    name: apex-scan-api
    runtime: image
    plan: free
    image:
      url: ghcr.io/umuttanhediyeler/trading-platform-api:latest
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: BACKTEST_SERVICE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: MARKET_DATA_PROVIDER
        value: alpaca
      - key: ALLOW_LIVE_BROKER
        value: "false"

  - type: web
    name: apex-scan-ml
    runtime: image
    plan: free
    image:
      url: ghcr.io/umuttanhediyeler/trading-platform-ml:latest
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: apex-scan-backtest
    runtime: image
    plan: free
    image:
      url: ghcr.io/umuttanhediyeler/trading-platform-backtest:latest
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
